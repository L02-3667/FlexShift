services:
  - type: web
    name: flexshift-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run prisma:generate && npm run build
    preDeployCommand: npm run db:migrate:deploy
    startCommand: npm run start:prod
    healthCheckPath: /api/health/readiness
    autoDeployTrigger: checksPass

    buildFilter:
      paths:
        - backend/**
        - render.yaml
        - .github/workflows/backend-render.yml

    envVars:
      - key: APP_ENV
        value: "production"
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CORS_ALLOW_CREDENTIALS
        value: "false"
      - key: PUBLIC_API_BASE_URL
        sync: false
      - key: API_DOCS_ENABLED
        value: "true"
      - key: API_DOCS_PATH
        value: "docs"
      - key: SYNC_BATCH_LIMIT
        value: "250"
      - key: SYNC_DEFAULT_STALE_MS
        value: "300000"