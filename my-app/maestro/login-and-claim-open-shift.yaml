appId: com.lehoangluan1.flexshiftmobile
---
- launchApp:
    clearState: true
- assertVisible:
    id: login-screen
- tapOn:
    id: login-email-input
- inputText: 'an.nguyen@flexshift.app'
- tapOn:
    id: login-password-input
- inputText: 'FlexShift123!'
- tapOn:
    id: login-submit-button
- assertVisible:
    id: employee-dashboard-screen
- tapOn: 'Ca trong'
- assertVisible:
    id: employee-open-shifts-screen
- tapOn:
    id: employee-open-shift-card-1
- assertVisible:
    id: employee-open-shift-detail-screen
- tapOn: 'Nhan ca nay'
- assertVisible: 'Nhan ca thanh cong'
