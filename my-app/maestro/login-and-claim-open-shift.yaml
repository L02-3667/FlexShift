appId: host.exp.exponent
---
- launchApp:
    clearState: true
    stopApp: true
- openLink: "${MAESTRO_EXPO_URL}"
- extendedWaitUntil:
    visible:
      id: login-screen
    timeout: 60000
- assertVisible:
    id: login-screen
- scrollUntilVisible:
    element:
      id: login-seed-account-employee
    direction: DOWN
    timeout: 20000
- tapOn:
    id: login-seed-account-employee
- scrollUntilVisible:
    element:
      id: login-submit-button
    direction: UP
    timeout: 20000
- tapOn:
    id: login-submit-button
- extendedWaitUntil:
    visible:
      id: employee-dashboard-screen
    timeout: 30000
- assertVisible:
    id: employee-dashboard-screen
- tapOn: 'Ca trống'
- assertVisible:
    id: employee-open-shifts-screen
- tapOn:
    id: employee-open-shift-card-1
- assertVisible:
    id: employee-open-shift-detail-screen
- tapOn: 'Nhận ca này'
- assertVisible: '(Nhận ca thành công|Đã đưa vào hàng đợi)'
