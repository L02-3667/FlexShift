appId: com.lehoangluan1.flexshiftmobile
---
- launchApp:
    clearState: true
- assertVisible:
    id: login-screen
- tapOn:
    id: login-email-input
- inputText: 'manager@flexshift.app'
- tapOn:
    id: login-password-input
- inputText: 'FlexShift123!'
- tapOn:
    id: login-submit-button
- assertVisible:
    id: manager-dashboard-screen
- tapOn: 'Duyet'
- assertVisible:
    id: manager-approvals-screen
- tapOn:
    id: manager-approval-request-card-1
- assertVisible:
    id: manager-approval-detail-screen
- tapOn: 'Duyet yeu cau'
- assertVisible: 'Da duyet yeu cau'
