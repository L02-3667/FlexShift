appId: com.lehoangluan1.flexshiftmobile
---
- launchApp:
    clearState: true
- assertVisible:
    id: login-screen
- tapOn:
    id: login-email-input
- inputText: 'an.nguyen@flexshift.app'
- tapOn:
    id: login-password-input
- inputText: 'FlexShift123!'
- tapOn:
    id: login-submit-button
- assertVisible:
    id: employee-dashboard-screen
- assertVisible: 'Trang thai dong bo'
- tapOn: 'Dong bo ngay'
- extendedWaitUntil:
    visible: 'Dang offline. Thay doi moi se vao hang doi an toan.'
    timeout: 5000
