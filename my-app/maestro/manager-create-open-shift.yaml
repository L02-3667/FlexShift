appId: com.lehoangluan1.flexshiftmobile
---
- launchApp:
    clearState: true
- assertVisible:
    id: login-screen
- tapOn:
    id: login-email-input
- inputText: 'manager@flexshift.app'
- tapOn:
    id: login-password-input
- inputText: 'FlexShift123!'
- tapOn:
    id: login-submit-button
- assertVisible:
    id: manager-dashboard-screen
- tapOn: 'Tao ca'
- assertVisible:
    id: manager-create-open-shift-screen
- tapOn: 'Tao ca trong'
- assertVisible:
    id: manager-create-open-shift-error
- tapOn:
    id: manager-open-shift-date-option-1
- tapOn:
    id: manager-open-shift-time-option-1
- tapOn:
    id: manager-open-shift-note-input
- inputText: 'Bo sung nhan su cho ca sang.'
- tapOn: 'Tao ca trong'
- assertVisible: 'Da tao ca trong'
