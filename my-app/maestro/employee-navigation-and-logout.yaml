appId: com.lehoangluan1.flexshiftmobile
---
- launchApp:
    clearState: true
- assertVisible:
    id: login-screen
- tapOn:
    id: login-email-input
- inputText: 'an.nguyen@flexshift.app'
- tapOn:
    id: login-password-input
- inputText: 'FlexShift123!'
- tapOn:
    id: login-submit-button
- assertVisible:
    id: employee-dashboard-screen
- tapOn: 'Lich'
- assertVisible:
    id: employee-calendar-screen
- tapOn: 'Ca trong'
- assertVisible:
    id: employee-open-shifts-screen
- tapOn: 'Yeu cau'
- assertVisible:
    id: employee-requests-screen
- tapOn: 'So lieu'
- assertVisible:
    id: employee-statistics-screen
- tapOn: 'Cai dat'
- assertVisible:
    id: employee-settings-screen
- tapOn: 'Dang xuat'
- assertVisible:
    id: login-screen
